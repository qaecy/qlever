services:
  # Incremental build service: mounts source + build dir as volumes.
  # Requires the qlever-builder:alpine image (build it once with:
  #   docker build --target builder -t qlever-builder:alpine \
  #     -f Dockerfiles/Dockerfile.cli-only.alpine .
  # ).
  builder:
    image: qlever-builder:alpine
    volumes:
      - .:/qlever
      - ./build-alpine:/qlever/build
    working_dir: /qlever/build
    user: root
    environment:
      - BUILD_JOBS=${BUILD_JOBS:-0}
    command: >
      /bin/sh -c "
        if [ \"$$BUILD_JOBS\" = '0' ]; then JOBS=$$(nproc); else JOBS=$$BUILD_JOBS; fi
        && cmake -GNinja -DCMAKE_BUILD_TYPE=Release -DLOGLEVEL=INFO
              -DCMAKE_CXX_FLAGS='-Wno-psabi -Wno-non-template-friend' ..
        && ninja -j$$JOBS qlever-cli qlever-index
      "

  # Packages the locally-built binaries into a slim Alpine runtime image
  # tagged as qlever-cli:alpine-test (used by the e2e test suite).
  # Run after 'builder' has produced ./build-alpine/qlever-cli.
  image-builder:
    build:
      context: .
      dockerfile: Dockerfiles/Dockerfile.cli-test-image
    image: qlever-cli:alpine-test

  # Runs the vitest e2e suite inside a linux/amd64 container that has both the
  # qlever-cli runtime libraries (jemalloc, boost, ICU 76, …) AND Node.js, so
  # the binary mounted at /workspace/qlever-cli is directly executable.
  #
  # Prerequisites:
  #   1. Build the runtime image:
  #        docker compose -f docker-compose.cli-alpine.yml run --rm image-builder
  #   2. Build the test-runner image (once, or after Dockerfile changes):
  #        docker compose -f docker-compose.cli-alpine.yml build test-runner
  #   3. Run the tests:
  #        docker compose -f docker-compose.cli-alpine.yml run --rm test-runner
  test-runner:
    build:
      context: .
      dockerfile: Dockerfiles/Dockerfile.cli-test-runner
    image: qlever-cli:test-runner
    platform: linux/amd64
    user: root
    working_dir: /workspace/e2e-cli
    volumes:
      - .:/workspace
    environment:
      - QLEVER_DIRECT_EXEC=1
